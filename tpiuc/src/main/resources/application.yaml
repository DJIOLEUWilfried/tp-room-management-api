spring:
  application:
    name: tpiuc

  datasource:
    url: jdbc:postgresql://localhost:5432/tpiuc_db
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    database: postgresql
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080